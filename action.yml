name: 'Diagnose with Denpex'
description: 'Automatically analyzes failed ML training jobs and outputs root cause, confidence, and recommended fixes.'
author: 'Denpex'
branding:
  icon: 'activity'
  color: 'red'

inputs:
  api-key:
    description: 'Your Denpex API Key (leave empty for test drive mode)'
    required: false
    default: ''
  logs-file:
    description: 'Path (relative to the workspace) of the training log to diagnose'
    required: false
    default: 'training.log'

runs:
  using: 'node20'
  main: 'diagnose.js'
