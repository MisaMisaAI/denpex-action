apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: denpex-daemon
  namespace: kube-system
  labels:
    app: denpex-daemon
spec:
  selector:
    matchLabels:
      app: denpex-daemon
  template:
    metadata:
      labels:
        app: denpex-daemon
    spec:
      tolerations:
      # Run on all nodes, even those tainted for NVIDIA GPUs
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: denpex-daemon
        image: your-registry.com/denpex-daemon:latest
        imagePullPolicy: Always
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: DENPEX_API_KEY
          valueFrom:
            secretKeyRef:
              name: denpex-secret
              key: api-key
        volumeMounts:
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: runlog
          mountPath: /run/log
          readOnly: true
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: runlog
        hostPath:
          path: /run/log
---
apiVersion: v1
kind: Secret
metadata:
  name: denpex-secret
  namespace: kube-system
type: Opaque
stringData:
  api-key: "YOUR_DENPEX_API_KEY_HERE"
