# Denpex node monitor — DaemonSet
# Runs on every node (incl. GPU-tainted ones), tails kernel/system logs for Xid /
# ECC / driver faults, and ships findings to Denpex for diagnosis + alert routing.
#
# Zero build required: runs on the public python:3.12-slim image and fetches the
# (stdlib-only) daemon script from denpex.com at startup — no private registry.
#
#   1. Replace YOUR_DENPEX_API_KEY_HERE below (key: denpex.com dashboard -> API Keys)
#   2. kubectl apply -f https://denpex.com/agent/daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: denpex-daemon
  namespace: kube-system
  labels:
    app: denpex-daemon
spec:
  selector:
    matchLabels:
      app: denpex-daemon
  template:
    metadata:
      labels:
        app: denpex-daemon
    spec:
      tolerations:
      # Run on all nodes, even those tainted for NVIDIA GPUs
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: denpex-daemon
        image: python:3.12-slim
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            python -c "import urllib.request as u; u.urlretrieve('https://denpex.com/agent/kubernetes/denpex-daemon.py', '/tmp/denpex-daemon.py')" && exec python /tmp/denpex-daemon.py
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 128Mi
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: DENPEX_API_KEY
          valueFrom:
            secretKeyRef:
              name: denpex-secret
              key: api-key
        volumeMounts:
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: runlog
          mountPath: /run/log
          readOnly: true
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: runlog
        hostPath:
          path: /run/log
---
apiVersion: v1
kind: Secret
metadata:
  name: denpex-secret
  namespace: kube-system
type: Opaque
stringData:
  api-key: "YOUR_DENPEX_API_KEY_HERE"
